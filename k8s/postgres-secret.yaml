# PostgreSQL Secret — credenciales de base de datos
# ⚠️  NUNCA commitear este archivo. Usar el .example como template.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: apps
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: academic_points