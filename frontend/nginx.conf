server {
    listen 80;

    # Health check endpoint — usado por Kubernetes liveness/readiness probes.
    # Sin esto, el pod de frontend sería matado y reiniciado en loop en GKE.
    location = /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        client_max_body_size 5M;
    }
}
