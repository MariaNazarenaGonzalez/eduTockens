<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EduTokens</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div class="app">
    <div class="screen active login-screen">
      <div class="login-header">
        <div class="login-logo">🎓</div>
        <h1 class="login-title">EduTokens</h1>
      </div>
      <div class="login-body">
        <div id="error-msg" class="error-msg"></div>

        <div class="login-tabs">
          <button class="login-tab active" onclick="setLoginRole('student', this)">Estudiante</button>
          <button class="login-tab" onclick="setLoginRole('admin', this)">Administrador</button>
        </div>

        <div class="input-group">
          <label class="input-label">Legajo / Email</label>
          <input type="text" id="login-identifier" class="input" placeholder="Tu legajo o email">
        </div>

        <div class="input-group">
          <label class="input-label">Desafío del sistema</label>
          <input type="text" id="login-challenge" class="input" readonly>
        </div>

        <div class="input-group">
          <label class="input-label">Desafío firmado con clave privada</label>
          <textarea id="login-signature" class="input" rows="4" placeholder="Firma hexadecimal del desafío"></textarea>
        </div>

        <div class="input-group">
          <label class="input-label">Clave privada (opcional para firmar aquí)</label>
          <textarea id="login-private-key" class="input" rows="6" placeholder="-----BEGIN PRIVATE KEY-----"></textarea>
        </div>

        <button class="btn btn-secondary" style="width: 100%; margin-top: 12px;" onclick="signLoginChallenge()">Firmar desafío</button>
        <button class="btn btn-primary" style="width: 100%; margin: 20px 0;" onclick="loginAction()">Ingresar</button>

        <div style="text-align: center; margin-top: 20px;">
          <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px;">¿No tienes cuenta?</p>
          <a href="register.html"
            style="color: var(--primary); text-decoration: none; font-weight: 500; font-size: 13px;">Crear una
            cuenta</a>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/crypto-auth.js"></script>
  <script>
    let currentRole = 'student';

    function setLoginRole(role, el) {
      currentRole = role;
      document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    async function loadLoginChallenge() {
      const errorEl = document.getElementById('error-msg');
      try {
        document.getElementById('login-challenge').value = await fetchAuthChallenge();
      } catch (error) {
        errorEl.textContent = error.message;
        errorEl.classList.add('show');
      }
    }

    async function signLoginChallenge() {
      const privateKey = document.getElementById('login-private-key').value.trim();
      const challenge = document.getElementById('login-challenge').value.trim();
      const errorEl = document.getElementById('error-msg');

      if (!privateKey || !challenge) {
        errorEl.textContent = 'Pegá la clave privada y obtené un desafío antes de firmar';
        errorEl.classList.add('show');
        setTimeout(() => errorEl.classList.remove('show'), 3000);
        return;
      }

      try {
        document.getElementById('login-signature').value = await signChallengeWithPrivateKey(privateKey, challenge);
      } catch (error) {
        errorEl.textContent = 'No se pudo firmar el desafío con la clave privada';
        errorEl.classList.add('show');
        setTimeout(() => errorEl.classList.remove('show'), 3000);
      }
    }

    async function loginAction() {
      const identifier = document.getElementById('login-identifier').value;
      const challenge = document.getElementById('login-challenge').value;
      const signature = document.getElementById('login-signature').value.trim();
      const errorEl = document.getElementById('error-msg');

      if (!identifier || !challenge || !signature) {
        errorEl.textContent = 'Por favor completa todos los campos';
        errorEl.classList.add('show');
        setTimeout(() => errorEl.classList.remove('show'), 3000);
        return;
      }

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, challenge, signature })
        });

        let data;
        try {
          data = await response.json();
        } catch {
          throw new Error('Error inesperado del servidor');
        }

        if (response.ok) {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('role', data.user.role);
          localStorage.setItem('user', JSON.stringify(data.user));

          if (data.user.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'home.html';
          }
        } else {
          throw new Error(data?.detail || 'Error en el login');
        }
      } catch (error) {
        errorEl.textContent = error.message;
        errorEl.classList.add('show');
        setTimeout(() => errorEl.classList.remove('show'), 3000);
        loadLoginChallenge();
      }
    }

    loadLoginChallenge();
  </script>
</body>

</html>
