<!DOCTYPE html>
<html lang="es">
<!-- DEO GLORIA -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace - EduTokens</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <button class="header-back" onclick="history.back()">← Atrás</button>
      <div class="header-title">Marketplace</div>
      <div style="width: 60px;"></div>
    </div>

    <!-- Main Content -->
    <div class="screen active content">
      <!-- Current Balance -->
      <div class="balance-card" style="margin-bottom: 20px;">
        <div class="balance-label">Saldo Disponible</div>
        <div class="balance-amount">
          <span id="marketplace-balance">0</span>
          <span class="balance-unit">puntos</span>
        </div>
      </div>

      <!-- Products Grid -->
      <div id="products-grid" class="product-grid">
        <!-- Skeleton placeholders -->
        <div class="product-card skeleton-card skeleton"></div>
        <div class="product-card skeleton-card skeleton"></div>
        <div class="product-card skeleton-card skeleton"></div>
        <div class="product-card skeleton-card skeleton"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <button class="nav-item" onclick="goTo('home.html')">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Inicio</div>
    </button>
    <button class="nav-item" onclick="goTo('wallet.html')">
      <div class="nav-icon">💳</div>
      <div class="nav-label">Cartera</div>
    </button>
    <button class="nav-item active" onclick="goTo('marketplace.html')">
      <div class="nav-icon">🎁</div>
      <div class="nav-label">Canjear</div>
    </button>
    <button class="nav-item" onclick="goTo('profile.html')">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Perfil</div>
    </button>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/marketplace.js"></script>
</body>

</html>
