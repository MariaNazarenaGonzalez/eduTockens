<!DOCTYPE html>
<html lang="es">
<!-- DEO GLORIA -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartera · EduTokens</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .balance-sub {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
    }
    .nonce-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
    }
    .nonce-value {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #fff;
    }

    /* ── Public Key ───────────────────────────────────────────── */
    .pubkey-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .pubkey-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .pubkey-value {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text);
      word-break: break-all;
      line-height: 1.5;
      background: var(--bg);
      padding: 12px;
      border-radius: 8px;
    }

    /* ── Wallet Status ────────────────────────────────────────── */
    .status-row {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 24px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .status-dot.green { background: var(--success); }
    .status-dot.amber { background: var(--warning); }

    /* ── Transaction Ledger ───────────────────────────────────── */
    .tx-row {
      display: grid;
      grid-template-columns: 56px 1fr 72px auto;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      gap: 12px;
      transition: background 0.1s;
    }
    .tx-row:last-child { border-bottom: none; }
    .tx-row:hover { background: var(--border-light); }
    .tx-type {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 6px;
      border-radius: 4px;
      text-align: center;
    }
    .tx-type.earn { color: var(--success); background: var(--success-bg); }
    .tx-type.spend { color: var(--error); background: var(--error-bg); }
    .tx-concept {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .tx-amount {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      text-align: right;
      font-weight: 600;
    }
    .tx-amount.earn { color: var(--success); }
    .tx-amount.spend { color: var(--error); }
    .tx-date {
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
      white-space: nowrap;
    }
    .tx-empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-muted);
      font-style: italic;
      font-size: 14px;
    }

    /* ── Admin Zone ───────────────────────────────────────────── */
    .admin-zone {
      margin-top: 32px;
      padding: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .admin-zone summary {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    .admin-zone[open] summary {
      margin-bottom: 12px;
    }
    .reset-form {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn-reset {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 12px 16px;
      border: 1.5px solid var(--error);
      border-radius: 10px;
      background: transparent;
      color: var(--error);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .btn-reset:hover:not(:disabled) { background: var(--error); color: white; }
    .btn-reset:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Toast ────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface-dark);
      color: var(--text-inverse);
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 1000;
      box-shadow: var(--shadow-xl);
      text-align: center;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translate(-50%, -4px);
    }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 480px) {
      .tx-row { grid-template-columns: 56px 1fr 64px; }
      .tx-date { display: none; }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <button class="header-back" onclick="history.back()">← Atrás</button>
      <div class="header-title">Cartera</div>
      <div style="width: 60px;"></div>
    </div>

    <!-- Main Content -->
    <div class="screen active content">
      <!-- Balance Card -->
      <div class="balance-card" style="margin-bottom: 20px;">
        <div class="balance-label">Saldo disponible</div>
        <div class="balance-amount">
          <span id="balance-amount">—</span><span class="balance-unit">pts</span>
        </div>
        <div class="balance-sub">
          <div class="nonce-bar">
            <span class="nonce-dot status-dot green"></span>
            <span>Nonce</span>
            <span class="nonce-value" id="nonce-value">—</span>
          </div>
          <div style="font-size: 12px; color: rgba(255, 255, 255, 0.8);">
            Pendientes: <span id="pending-nonce" style="font-family: 'DM Mono', monospace;">—</span>
          </div>
        </div>
      </div>

      <!-- Public Key -->
      <div class="card pubkey-card" style="margin-bottom: 20px;">
        <div class="pubkey-header">
          <span class="pubkey-label">Clave Pública</span>
          <button class="btn btn-secondary btn-sm" id="btn-copy" onclick="copyPubkey()">Copiar</button>
        </div>
        <div class="pubkey-value" id="pubkey-value">—</div>
      </div>

      <!-- Wallet Status -->
      <div class="status-row">
        <span id="wallet-status">Verificando...</span>
      </div>

      <!-- Transaction History -->
      <div class="section-header">
        <span class="section-title">Historial de Transacciones</span>
        <span class="mono" id="tx-count" style="font-size: 12px; color: var(--text-muted);">—</span>
      </div>
      <div class="card" style="padding: 0; overflow: hidden; margin-bottom: 20px;">
        <div class="tx-list" id="tx-list">
          <div class="tx-empty">Cargando...</div>
        </div>
      </div>

      <!-- Admin Zone -->
      <details class="admin-zone">
        <summary>⚙ Zona de administración</summary>
        <p style="font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 16px; margin-top: 8px;">
          Para resetear tu wallet, tipeá <strong class="mono">ELIMINAR</strong> y confirmá.
          Esto borra tu clave privada cifrada del navegador. Irreversible.
        </p>
        <div class="reset-form">
          <input type="text" class="input mono" id="reset-input"
            placeholder="Escribí ELIMINAR para confirmar"
            oninput="onResetInput()" autocomplete="off">
          <button class="btn-reset" id="btn-reset" disabled onclick="resetWallet()">
            Reset Wallet
          </button>
        </div>
      </details>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <button class="nav-item" onclick="goTo('home.html')">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Inicio</div>
    </button>
    <button class="nav-item active" onclick="goTo('wallet.html')">
      <div class="nav-icon">💳</div>
      <div class="nav-label">Cartera</div>
    </button>
    <button class="nav-item" onclick="goTo('marketplace.html')">
      <div class="nav-icon">🎁</div>
      <div class="nav-label">Canjear</div>
    </button>
    <button class="nav-item" onclick="goTo('profile.html')">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Perfil</div>
    </button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="../js/common.js"></script>
  <script src="../js/crypto-auth.js"></script>
  <script src="../js/wallet-crypto.js"></script>
  <script src="../js/tx-signer.js"></script>
  <script src="../js/wallet.js"></script>
  <script src="../js/wallet-page.js"></script>
</body>

</html>
