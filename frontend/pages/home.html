<!DOCTYPE html>
<html lang="es">
<!-- DEO GLORIA -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - EduTokens</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div style="font-size: 14px; font-weight: 600; color: var(--primary);">🎓 EduTokens</div>
      <div style="font-size: 14px; color: var(--text-muted);">Hola, <span id="student-name">Estudiante</span> 👋</div>
      <button class="header-action" onclick="logout()">⊗</button>
    </div>

    <!-- Main Content -->
    <div class="screen active content">
      <!-- Balance Card -->
      <div class="balance-card" style="margin-bottom: 20px;">
        <div class="balance-label">Saldo Disponible</div>
        <div class="balance-amount">
          <span id="balance-amount">0</span>
          <span class="balance-unit">pts</span>
        </div>
        <div class="balance-status">
          <div class="dot-pulse"></div>
          <span>Confirmado en blockchain</span>
        </div>
      </div>

      <!-- Quick Actions -->
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;">
        <button class="btn btn-outline" style="width: 100%; padding: 14px 8px; flex-direction: column; font-size: 12px; height: auto;" onclick="goTo('marketplace.html')">🛍️ Canjear</button>
        <button class="btn btn-outline" style="width: 100%; padding: 14px 8px; flex-direction: column; font-size: 12px; height: auto;" onclick="goTo('marketplace.html')">🎁 Ofertas</button>
        <button class="btn btn-outline" style="width: 100%; padding: 14px 8px; flex-direction: column; font-size: 12px; height: auto;" onclick="loadBalance()">🔄 Actualizar</button>
      </div>

      <!-- Transactions Section -->
      <div class="section-header">
        <div class="section-title">Historial Reciente</div>
        <button class="section-link" onclick="goTo('#historial')">Ver todo →</button>
      </div>

      <div class="card" style="padding: 0;">
        <div id="transactions-list" style="overflow: hidden; border-radius: 16px;">
          <!-- Skeleton placeholder -->
          <div id="tx-skeleton">
            <div class="skeleton-row"><div class="skeleton skeleton-circle"></div><div style="flex:1"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text"></div></div></div>
            <div class="skeleton-row"><div class="skeleton skeleton-circle"></div><div style="flex:1"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text"></div></div></div>
            <div class="skeleton-row"><div class="skeleton skeleton-circle"></div><div style="flex:1"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text"></div></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <button class="nav-item active" onclick="goTo('home.html')">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Inicio</div>
    </button>
    <button class="nav-item" onclick="goTo('wallet.html')">
      <div class="nav-icon">💳</div>
      <div class="nav-label">Cartera</div>
    </button>
    <button class="nav-item" onclick="goTo('marketplace.html')">
      <div class="nav-icon">🎁</div>
      <div class="nav-label">Canjear</div>
    </button>
    <button class="nav-item" onclick="goTo('profile.html')">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Perfil</div>
    </button>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/home.js"></script>
</body>

</html>
