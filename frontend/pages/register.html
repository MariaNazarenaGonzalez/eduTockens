<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - EduTokens</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="app">
    <div class="screen active" style="padding: 0; display: flex; flex-direction: column;">
      <div style="background: linear-gradient(135deg, #5B5BF7 0%, #7C3AED 100%); color: white; padding: 40px 30px;">
        <a href="../index.html" style="color: white; text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 6px; margin-bottom: 16px;">
          ← Volver
        </a>
        <h1 style="font-size: 28px; font-weight: 700;">Crear Cuenta</h1>
        <p style="font-size: 13px; opacity: 0.8; margin-top: 8px;">Completa el formulario para registrarte</p>
      </div>

      <div style="flex: 1; padding: 30px 20px; overflow-y: auto;">
        <div id="error-msg" class="error-msg"></div>
        <div id="success-msg" class="success-msg"></div>

        <div class="input-group">
          <label class="input-label">Legajo Universitario</label>
          <input type="text" id="reg-legajo" class="input" placeholder="Ej: 12345678">
        </div>

        <div class="input-group">
          <label class="input-label">Nombre Completo</label>
          <input type="text" id="reg-name" class="input" placeholder="Tu nombre completo">
        </div>

        <div class="input-group">
          <label class="input-label">Email</label>
          <input type="email" id="reg-email" class="input" placeholder="tu@email.com">
        </div>

        <div class="input-group">
          <label class="input-label">Clave pública</label>
          <textarea id="reg-public-key" class="input" rows="6" placeholder="-----BEGIN PUBLIC KEY-----"></textarea>
        </div>

        <div class="input-group">
          <label class="input-label">Desafío del sistema</label>
          <input type="text" id="reg-challenge" class="input" readonly>
        </div>

        <div class="input-group">
          <label class="input-label">Desafío firmado con clave privada</label>
          <textarea id="reg-signature" class="input" rows="4" placeholder="Firma hexadecimal del desafío"></textarea>
        </div>

        <div class="input-group">
          <label class="input-label">Clave privada (opcional para firmar aquí)</label>
          <textarea id="reg-private-key" class="input" rows="6" placeholder="-----BEGIN PRIVATE KEY-----"></textarea>
        </div>

        <button class="btn btn-secondary" style="width: 100%; margin-top: 12px;" onclick="generateRegisterKeys()">Generar claves</button>
        <button class="btn btn-secondary" style="width: 100%; margin-top: 12px;" onclick="signRegisterChallenge()">Firmar desafío</button>
        <button class="btn btn-primary" style="width: 100%; margin: 20px 0;" onclick="registerAction()">Crear Cuenta</button>

        <div style="text-align: center; margin-top: 16px;">
          <p style="font-size: 13px; color: var(--text-muted);">¿Ya tienes cuenta?</p>
          <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 500; font-size: 13px;">Inicia sesión aquí</a>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/crypto-auth.js"></script>
  <script>
    async function loadRegisterChallenge() {
      const errorEl = document.getElementById('error-msg');
      try {
        document.getElementById('reg-challenge').value = await fetchAuthChallenge();
      } catch (error) {
        errorEl.textContent = error.message;
        errorEl.classList.add('show');
      }
    }

    async function generateRegisterKeys() {
      const errorEl = document.getElementById('error-msg');
      try {
        const keys = await generateEcdsaKeyPairPem();
        document.getElementById('reg-public-key').value = keys.publicKeyPem;
        document.getElementById('reg-private-key').value = keys.privateKeyPem;
        await signRegisterChallenge();
      } catch (error) {
        errorEl.textContent = 'No se pudieron generar las claves en el navegador';
        errorEl.classList.add('show');
        setTimeout(() => errorEl.classList.remove('show'), 3000);
      }
    }

    async function signRegisterChallenge() {
      const privateKey = document.getElementById('reg-private-key').value.trim();
      const challenge = document.getElementById('reg-challenge').value.trim();
      const errorEl = document.getElementById('error-msg');

      if (!privateKey || !challenge) {
        errorEl.textContent = 'Pegá la clave privada y obtené un desafío antes de firmar';
        errorEl.classList.add('show');
        setTimeout(() => errorEl.classList.remove('show'), 3000);
        return;
      }

      try {
        document.getElementById('reg-signature').value = await signChallengeWithPrivateKey(privateKey, challenge);
      } catch (error) {
        errorEl.textContent = 'No se pudo firmar el desafío con la clave privada';
        errorEl.classList.add('show');
        setTimeout(() => errorEl.classList.remove('show'), 3000);
      }
    }

    async function registerAction() {
      const legajo = document.getElementById('reg-legajo').value;
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const public_key_pem = document.getElementById('reg-public-key').value.trim();
      const challenge = document.getElementById('reg-challenge').value;
      const signature = document.getElementById('reg-signature').value.trim();
      const errorEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');

      if (!legajo || !name || !email || !public_key_pem || !challenge || !signature) {
        errorEl.textContent = 'Por favor completa todos los campos';
        errorEl.classList.add('show');
        setTimeout(() => errorEl.classList.remove('show'), 3000);
        return;
      }

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ legajo, name, email, public_key_pem, challenge, signature })
        });

        const data = await response.json();

        if (response.ok) {
          successEl.textContent = 'Cuenta creada exitosamente. Redirigiendo...';
          successEl.classList.add('show');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          throw new Error(data.detail || 'Error en el registro');
        }
      } catch (error) {
        errorEl.textContent = error.message;
        errorEl.classList.add('show');
        setTimeout(() => errorEl.classList.remove('show'), 3000);
        loadRegisterChallenge();
      }
    }

    loadRegisterChallenge();
  </script>
</body>
</html>
