# ci.yml — Build y push de imágenes Docker de EduTokens-app a Artifact Registry
#
# Triggers:
#   push a main         → build + push de las 2 imágenes
#   pull_request a main → solo build (verifica que compilan, sin pushear)
#
# Autenticación a GCP vía Workload Identity Federation (OIDC).
# Cero service account keys — el token OIDC lo emite GitHub Actions
# y GCP lo valida contra el pool github-actions-oidc.
#
# ⚠️  Requisito previo (ya está en iam.tf, solo falta aplicar):
#   El pool WIF ya acepta MariaNazarenaGonzalez/ (attribute_condition) y
#   tiene el binding IAM para MariaNazarenaGonzalez/eduTockens.
#   Solo falta ejecutar: cd pilar3/tofu && tofu apply

name: CI — Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: us-central1-docker.pkg.dev
  REPO: edutokens-2026/edutokens-repo

jobs:
  build-and-push:
    name: Build images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # necesario para google-github-actions/auth

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── GCP Authentication ──────────────────────────────────────────
      # Solo en push a main (no en PRs desde forks)
      - name: Auth to GCP
        if: github.event_name == 'push'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/381458252403/locations/global/workloadIdentityPools/github-actions-oidc/providers/github-actions-provider
          service_account: github-actions@edutokens-2026.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        if: github.event_name == 'push'
        run: gcloud auth configure-docker $REGISTRY --quiet

      # ── Buildx (container driver, necesario para cache export) ──────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & Push helpers ────────────────────────────────────────
      - name: Set push flag
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "push=true" >> $GITHUB_OUTPUT
          else
            echo "push=false" >> $GITHUB_OUTPUT
          fi

      # ── Backend (FastAPI + uvicorn) ──────────────────────────────────
      - name: Build Backend
        uses: docker/build-push-action@v6
        with:
          context: backend/
          file: backend/Dockerfile
          push: ${{ steps.flags.outputs.push }}
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/edutokens-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: ${{ steps.flags.outputs.push == 'true' && 'type=gha,mode=max,scope=backend' || '' }}

      # ── Frontend (nginx + estáticos) ─────────────────────────────────
      - name: Build Frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend/
          file: frontend/Dockerfile
          push: ${{ steps.flags.outputs.push }}
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/edutokens-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: ${{ steps.flags.outputs.push == 'true' && 'type=gha,mode=max,scope=frontend' || '' }}
