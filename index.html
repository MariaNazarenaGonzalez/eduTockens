<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduPoints</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --primary:#5B5BF7;--primary-dark:#4747d6;--secondary:#7C3AED;
    --bg:#F8FAFC;--card:#FFFFFF;--success:#22C55E;--error:#EF4444;
    --text:#0F172A;--text-muted:#64748B;--text-light:#94A3B8;
    --border:#E2E8F0;--radius:16px;--radius-sm:10px;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(91,91,247,.06);
    --shadow-lg:0 8px 32px rgba(91,91,247,.12);
  }
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  .mono{font-family:'DM Mono',monospace}
  
  /* App shell */
  .app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;display:flex;flex-direction:column}
  .screen{flex:1;overflow-y:auto;padding-bottom:80px;animation:fadeIn .2s ease;display:none}
  .screen.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  
  /* Loading spinner */
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  
  /* Bottom Nav */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding:8px 0}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 4px;transition:all .15s}
  .nav-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
  .nav-label{font-size:10px;font-weight:500;color:var(--text-light);transition:color .15s}
  .nav-item.active .nav-label{color:var(--primary)}
  .nav-item.active .nav-icon svg{stroke:var(--primary)}
  .nav-item .nav-icon svg{stroke:var(--text-light);transition:stroke .15s}
  
  /* Header */
  .header{padding:20px 20px 8px;display:flex;align-items:center;justify-content:space-between}
  .header-back{display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--primary);font-weight:500;font-size:15px}
  .header-title{font-size:17px;font-weight:600;text-align:center;flex:1}
  .header-action{width:32px;height:32px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border)}
  
  /* Cards */
  .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow)}
  .card-sm{padding:14px 16px}
  
  /* Balance Card */
  .balance-card{background:linear-gradient(135deg,#5B5BF7 0%,#7C3AED 100%);border-radius:var(--radius);padding:24px;color:#fff;position:relative;overflow:hidden}
  .balance-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,.07);border-radius:50%}
  .balance-card::after{content:'';position:absolute;bottom:-60px;left:-20px;width:200px;height:200px;background:rgba(255,255,255,.04);border-radius:50%}
  .balance-label{font-size:12px;font-weight:500;opacity:.8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .balance-amount{font-size:52px;font-weight:600;line-height:1;display:flex;align-items:baseline;gap:8px}
  .balance-unit{font-size:18px;font-weight:400;opacity:.7}
  .balance-wallet{font-size:11px;opacity:.6;margin-top:10px;font-family:'DM Mono',monospace}
  .balance-status{display:inline-flex;align-items:center;gap:5px;margin-top:12px;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;font-size:12px}
  .dot-pulse{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  
  /* Metric cards */
  .metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 20px}
  .metric-card{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:14px 12px;text-align:center}
  .metric-value{font-size:22px;font-weight:600;color:var(--primary);line-height:1.1}
  .metric-label{font-size:10px;color:var(--text-muted);margin-top:4px;line-height:1.3}
  
  /* Transaction item */
  .tx-item{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
  .tx-item:hover{background:#F8FAFC}
  .tx-item:last-child{border-bottom:none}
  .tx-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .tx-icon.income{background:#F0FDF4}
  .tx-icon.expense{background:#FFF1F1}
  .tx-info{flex:1;min-width:0}
  .tx-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
  .tx-amount{font-size:15px;font-weight:600;white-space:nowrap}
  .tx-amount.income{color:var(--success)}
  .tx-amount.expense{color:var(--error)}
  
  /* Badge */
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}
  .badge-success{background:#F0FDF4;color:#16A34A}
  .badge-primary{background:#EEF2FF;color:var(--primary)}
  .badge-muted{background:var(--bg);color:var(--text-muted);border:1px solid var(--border)}
  
  /* Button */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 16px rgba(91,91,247,.3)}
  .btn-primary:active{transform:translateY(0)}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
  .btn-outline:hover{background:#EEF2FF}
  .btn-ghost{background:transparent;color:var(--text-muted);border:none;font-size:14px}
  .btn-sm{padding:9px 16px;font-size:13px;width:auto;border-radius:8px}
  
  /* Section title */
  .section-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 12px}
  .section-title{font-size:15px;font-weight:600}
  .section-link{font-size:13px;color:var(--primary);cursor:pointer;font-weight:500}
  
  /* Avatar */
  .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#5B5BF7,#7C3AED);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:16px}
  
  /* Input */
  .input-group{margin-bottom:16px}
  .input-label{font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:6px;display:block}
  .input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--card);transition:border-color .15s}
  .input:focus{border-color:var(--primary);outline:none}
  
  /* Login screen */
  .login-container{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(135deg,#5B5BF7 0%,#7C3AED 100%);padding:40px 20px}
  .login-header{color:#fff;text-align:center;margin-bottom:40px}
  .login-logo{font-size:48px;font-weight:700;margin-bottom:8px}
  .login-title{font-size:24px;font-weight:600}
  .login-body{background:#fff;border-radius:var(--radius);padding:32px 24px;flex:1;display:flex;flex-direction:column;justify-content:center}
  .login-tabs{display:flex;gap:12px;margin-bottom:28px;border-bottom:2px solid var(--border);padding-bottom:12px}
  .login-tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;color:var(--text-muted);border:none;background:none;border-bottom:2px solid transparent;transition:all .15s}
  .login-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
  
  /* Error message */
  .error-msg{background:#FFF1F1;border:1px solid #FECDD3;color:var(--error);padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:16px;font-size:13px;display:none}
  .error-msg.show{display:block}
  
  /* Loading overlay */
  .loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000}
  .loading-overlay.show{display:flex}
  .loading-spinner{background:#fff;padding:24px;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;gap:12px}
  .loading-spinner .spinner{width:32px;height:32px;border-width:3px}
  .loading-spinner p{font-size:14px;color:var(--text-muted)}
  
  /* Product card */
  .product-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:all .15s}
  .product-card:hover{border-color:var(--primary);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
  .product-img{width:100%;height:80px;border-radius:8px;background:linear-gradient(135deg,#EEF2FF,#F5F3FF);display:flex;align-items:center;justify-content:center;font-size:36px}
  .product-name{font-size:14px;font-weight:600}
  .product-cost{font-size:13px;color:var(--primary);font-weight:500}
  
  /* Admin styles */
  .admin-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;text-align:center}
  .admin-stat-val{font-size:28px;font-weight:700;color:var(--primary)}
  .admin-stat-lbl{font-size:11px;color:var(--text-muted);margin-top:8px;text-transform:uppercase}
  .admin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 20px;margin-bottom:20px}
  
  .chart-wrap{display:flex;align-items:flex-end;gap:4px;height:120px;padding:12px 0}
  .chart-bar{flex:1;background:var(--primary);border-radius:4px 4px 0 0;min-height:2px;transition:opacity .15s;opacity:.7}
  .chart-bar:hover{opacity:1}
  
  /* Table */
  .admin-table{width:100%;border-collapse:collapse;font-size:12px}
  .admin-table th{text-align:left;padding:12px;font-weight:600;color:var(--text-muted);border-bottom:1px solid var(--border)}
  .admin-table td{padding:12px;border-bottom:1px solid var(--border);color:var(--text)}
  .admin-table tr:last-child td{border-bottom:none}
  
  /* Success screen */
  .success-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:40px 20px;text-align:center}
  .success-circle{width:96px;height:96px;background:linear-gradient(135deg,#22C55E,#16A34A);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:24px}
  
  /* Scrollbar */
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<div class="loading-overlay" id="loading"><div class="loading-spinner"><div class="spinner"></div><p>Cargando...</p></div></div>
<div class="app" id="app">
  <div class="screen" id="screen-container"></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<script>
const API_BASE_URL = 'http://localhost:3000/api';
const STORAGE_TOKEN = 'edutoken_auth';

let state = {
  authenticated: false,
  userRole: null,
  screen: 'login',
  token: localStorage.getItem(STORAGE_TOKEN),
  student: null,
  admin: null,
  balance: 0,
  transactions: [],
  grades: [],
  products: { expendedoras: [], fotocopiadoras: [] },
  commerces: [],
  selectedProduct: null,
  payForm: { commerce: '', concept: '', amount: '' },
};

const API = {
  showLoading: (show = true) => {
    document.getElementById('loading').classList.toggle('show', show);
  },

  handleError: (error) => {
    console.error('API Error:', error);
    showError(error.message || 'Error en la conexión');
  },

  login: async (email, password, role) => {
    try {
      API.showLoading();
      const response = await fetch(`${API_BASE_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role })
      });
      
      if (!response.ok) throw new Error('Credenciales inválidas');
      
      const data = await response.json();
      state.token = data.token;
      state.authenticated = true;
      state.userRole = role;
      
      localStorage.setItem(STORAGE_TOKEN, data.token);
      
      if (role === 'admin') {
        await API.loadAdminData();
        navigate('admin');
      } else {
        await API.loadStudentData();
        navigate('dashboard');
      }
    } catch (e) {
      API.handleError(e);
    } finally {
      API.showLoading(false);
    }
  },

  loadStudentData: async () => {
    try {
      const headers = { 'Authorization': `Bearer ${state.token}` };
      
      const [student, balance, txns, grades, products, commerces] = await Promise.all([
        fetch(`${API_BASE_URL}/student/profile`, { headers }).then(r => r.json()),
        fetch(`${API_BASE_URL}/student/balance`, { headers }).then(r => r.json()),
        fetch(`${API_BASE_URL}/student/transactions`, { headers }).then(r => r.json()),
        fetch(`${API_BASE_URL}/student/grades`, { headers }).then(r => r.json()),
        fetch(`${API_BASE_URL}/products`, { headers }).then(r => r.json()),
        fetch(`${API_BASE_URL}/commerces`, { headers }).then(r => r.json()),
      ]);

      state.student = student;
      state.balance = balance.amount || 0;
      state.transactions = txns.data || [];
      state.grades = grades.data || [];
      state.products = products;
      state.commerces = commerces.data || [];
      
    } catch (e) {
      loadMockStudentData();
    }
  },

  loadAdminData: async () => {
    try {
      const headers = { 'Authorization': `Bearer ${state.token}` };
      const data = await fetch(`${API_BASE_URL}/admin/dashboard`, { headers }).then(r => r.json());
      state.admin = data;
    } catch (e) {
      loadMockAdminData();
    }
  },

  redeemProduct: async (productId) => {
    try {
      API.showLoading();
      const response = await fetch(`${API_BASE_URL}/student/redeem`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.token}`
        },
        body: JSON.stringify({ productId })
      });

      if (!response.ok) throw new Error('No se pudo procesar el canje');
      
      const result = await response.json();
      state.balance = result.newBalance;
      navigate('redeem-success');
      
    } catch (e) {
      showError('Canje procesado (modo demo)');
      navigate('redeem-success');
    } finally {
      API.showLoading(false);
    }
  },

  processPay: async (commerceId, amount, concept) => {
    try {
      API.showLoading();
      const response = await fetch(`${API_BASE_URL}/student/pay`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.token}`
        },
        body: JSON.stringify({ commerceId, amount, concept })
      });

      if (!response.ok) throw new Error('No se pudo procesar el pago');
      
      const result = await response.json();
      state.balance = result.newBalance;
      navigate('pay-success');
      
    } catch (e) {
      state.balance -= amount;
      showError('Pago procesado (modo demo)');
      navigate('pay-success');
    } finally {
      API.showLoading(false);
    }
  },

  emitPoints: async (legajo, activity, subject, points, concept) => {
    try {
      API.showLoading();
      const response = await fetch(`${API_BASE_URL}/admin/emit-points`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.token}`
        },
        body: JSON.stringify({ legajo, activity, subject, points, concept })
      });

      if (!response.ok) throw new Error('No se pudieron emitir los puntos');
      
      showError('Puntos emitidos exitosamente', 'success');
      setTimeout(() => navigate('admin'), 1500);
      
    } catch (e) {
      showError('Puntos emitidos (modo demo)', 'success');
      setTimeout(() => navigate('admin'), 1500);
    } finally {
      API.showLoading(false);
    }
  },

  logout: () => {
    state.token = null;
    state.authenticated = false;
    localStorage.removeItem(STORAGE_TOKEN);
    navigate('login');
  }
};

function showError(message, type = 'error') {
  const errorEl = document.createElement('div');
  errorEl.className = `error-msg show`;
  if (type === 'success') {
    errorEl.style.background = '#F0FDF4';
    errorEl.style.borderColor = '#BBF7D0';
    errorEl.style.color = '#16A34A';
  }
  errorEl.textContent = message;
  
  const container = document.querySelector('.screen.active');
  if (container) container.insertBefore(errorEl, container.firstChild);
  
  setTimeout(() => errorEl.remove(), 3000);
}

function navigate(s, extra = {}) {
  state.screen = s;
  Object.assign(state, extra);
  render();
}

const navItems = [
  { id: 'dashboard', label: 'Inicio', svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>' },
  { id: 'transactions', label: 'Movimientos', svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><path d="M8 6l4-4 4 4M12 2v14M4 16l8 4 8-4"/></svg>' },
  { id: 'rewards', label: 'Canjear', svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><path d="M20 12V22H4V12"/><path d="M8 2h8v10H8z"/></svg>' },
  { id: 'commerces', label: 'Comercios', svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>' },
  { id: 'profile', label: 'Perfil', svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/></svg>' },
];

function renderNav() {
  if (state.screen === 'login') {
    document.getElementById('bottom-nav').innerHTML = '';
    return;
  }
  const mains = ['dashboard', 'transactions', 'rewards', 'commerces', 'profile', 'admin'];
  const currentMain = mains.includes(state.screen) ? state.screen : 'dashboard';
  
  document.getElementById('bottom-nav').innerHTML = navItems.map(n => `
    <div class="nav-item ${currentMain === n.id ? 'active' : ''}" onclick="navigate('${n.id}')">
      <div class="nav-icon">${n.svg}</div>
      <span class="nav-label">${n.label}</span>
    </div>`).join('');
}

function screens() {
  const s = state;
  if (s.screen === 'login') return screenLogin();
  if (s.screen === 'dashboard') return screenDashboard();
  if (s.screen === 'transactions') return screenTransactions();
  if (s.screen === 'rewards') return screenRewards();
  if (s.screen === 'product-detail') return screenProductDetail();
  if (s.screen === 'redeem-success') return screenRedeemSuccess();
  if (s.screen === 'commerces') return screenCommerces();
  if (s.screen === 'pay') return screenPay();
  if (s.screen === 'pay-success') return screenPaySuccess();
  if (s.screen === 'profile') return screenProfile();
  if (s.screen === 'admin') return screenAdmin();
  if (s.screen === 'admin-emit') return screenAdminEmit();
  return screenLogin();
}

function screenLogin() {
  return `
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">🎓</div>
      <div class="login-title">EduPoints</div>
      <p style="font-size:13px;margin-top:8px;opacity:.9">Tu wallet educativa universitaria</p>
    </div>
    <div class="login-body">
      <div class="login-tabs">
        <button class="login-tab active" onclick="setLoginTab('student', this)">Estudiante</button>
        <button class="login-tab" onclick="setLoginTab('admin', this)">Administrador</button>
      </div>
      <div class="input-group">
        <label class="input-label">Email institucional</label>
        <input class="input" type="email" id="login-email" placeholder="usuario@universidad.edu.ar" value="estudiante@unr.edu.ar">
      </div>
      <div class="input-group">
        <label class="input-label">Contraseña</label>
        <input class="input" type="password" id="login-password" placeholder="••••••••" value="password123">
      </div>
      <button class="btn btn-primary" onclick="loginAction()" style="margin-top:8px">Ingresar</button>
      <div style="font-size:12px;color:var(--text-muted);margin-top:16px;text-align:center">
        <p style="margin-bottom:8px">Demo: usa cualquier credencial</p>
        <p style="font-size:11px">Modo local hasta integrar backend</p>
      </div>
    </div>
  </div>`;
}

let loginRole = 'student';
function setLoginTab(role, el) {
  loginRole = role;
  document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

async function loginAction() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  
  if (!email || !password) {
    showError('Completa todos los campos');
    return;
  }

  state.authenticated = true;
  state.userRole = loginRole;
  state.token = 'demo-token-' + Date.now();

  await API.processPay(state.payForm.commerce, cost, state.payForm.concept);
}
